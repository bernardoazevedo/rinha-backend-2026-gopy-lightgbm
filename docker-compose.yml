services:
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api1:
    image: ghcr.io/bernardoazevedo/rinha-backend-2026-gopy-lightgbm:latest
    networks:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

  api2:
    image: ghcr.io/bernardoazevedo/rinha-backend-2026-gopy-lightgbm:latest
    networks:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "165MB"

networks:
  api:
    driver: bridge