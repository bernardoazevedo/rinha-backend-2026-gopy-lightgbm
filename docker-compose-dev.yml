services:
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    networks:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api1: &api
    build: 
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./:/app
    networks:
      - api
    deploy:
      resources:
        limits:
          # cpus: "0.40"
          cpus: "0.40"
          # memory: "165MB"
          memory: "300MB"

  api2:
    <<: *api

networks:
  api:
    driver: bridge